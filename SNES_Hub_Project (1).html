<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SNES Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mona+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { height: 100%; }
        
        :root {
            --canvas-default: #1a1a2e;
            --canvas-subtle: #25253d;
            --canvas-inset: #0f0f1a;
            --border-default: #4a4a6a;
            --border-muted: #35354d;
            --fg-default: #e6edf3;
            --fg-muted: #8b949e;
            --fg-subtle: #6e7681;
            --accent-fg: #b4b4dc;
            --accent-emphasis: #8080b0;
            --success-fg: #50c878;
            --success-emphasis: #3da35d;
            --attention-fg: #d29922;
            --snes-purple: #4c4c80;
            --snes-gray: #b0b0b0;
            --btn-gradient: linear-gradient(145deg, #8080b0, #6060a0);
            --btn-shadow: #404070;
            --glow-color: rgba(128, 128, 176, 0.15);
        }
        
        /* THEMES */
        body.theme-zelda-lttp { --canvas-default: #0f1a0a; --canvas-subtle: #1a2d10; --canvas-inset: #080d05; --border-default: #4a7830; --border-muted: #2a4820; --accent-fg: #90ee90; --accent-emphasis: #5cb85c; --success-fg: #98fb98; --success-emphasis: #449d44; --btn-gradient: linear-gradient(145deg, #5cb85c, #449d44); --btn-shadow: #2d672d; --glow-color: rgba(92, 184, 92, 0.15); }
        body.theme-super-mario-world { --canvas-default: #0a1020; --canvas-subtle: #102040; --canvas-inset: #050810; --border-default: #3060c0; --border-muted: #204080; --accent-fg: #6090ff; --accent-emphasis: #4070d0; --success-fg: #ff6060; --success-emphasis: #d04040; --btn-gradient: linear-gradient(145deg, #d04040, #b03030); --btn-shadow: #702020; --glow-color: rgba(64, 112, 208, 0.15); }
        body.theme-super-metroid { --canvas-default: #0a0f15; --canvas-subtle: #101820; --canvas-inset: #050810; --border-default: #304050; --border-muted: #203040; --accent-fg: #00ff88; --accent-emphasis: #00cc66; --success-fg: #ff4444; --success-emphasis: #cc3333; --btn-gradient: linear-gradient(145deg, #00cc66, #009944); --btn-shadow: #006633; --glow-color: rgba(0, 204, 102, 0.15); }
        body.theme-chrono-trigger { --canvas-default: #101520; --canvas-subtle: #182030; --canvas-inset: #080c10; --border-default: #405080; --border-muted: #304060; --accent-fg: #80c0ff; --accent-emphasis: #5090d0; --success-fg: #ffcc00; --success-emphasis: #cca000; --btn-gradient: linear-gradient(145deg, #5090d0, #4080c0); --btn-shadow: #305080; --glow-color: rgba(80, 144, 208, 0.15); }
        body.theme-final-fantasy-vi { --canvas-default: #100a15; --canvas-subtle: #1a1025; --canvas-inset: #080510; --border-default: #503070; --border-muted: #352050; --accent-fg: #c090ff; --accent-emphasis: #9060d0; --success-fg: #ff9060; --success-emphasis: #d07040; --btn-gradient: linear-gradient(145deg, #9060d0, #7050b0); --btn-shadow: #403060; --glow-color: rgba(144, 96, 208, 0.15); }
        body.theme-donkey-kong-country { --canvas-default: #0a1508; --canvas-subtle: #152810; --canvas-inset: #050a04; --border-default: #408020; --border-muted: #285010; --accent-fg: #80ff40; --accent-emphasis: #60c030; --success-fg: #ffcc00; --success-emphasis: #cca000; --btn-gradient: linear-gradient(145deg, #60c030, #50a028); --btn-shadow: #306018; --glow-color: rgba(96, 192, 48, 0.15); }
        body.theme-earthbound { --canvas-default: #151020; --canvas-subtle: #201830; --canvas-inset: #0a0810; --border-default: #6040a0; --border-muted: #403070; --accent-fg: #ff80c0; --accent-emphasis: #d060a0; --success-fg: #80ffff; --success-emphasis: #60cccc; --btn-gradient: linear-gradient(145deg, #d060a0, #b05090); --btn-shadow: #603050; --glow-color: rgba(208, 96, 160, 0.15); }
        body.theme-mega-man-x { --canvas-default: #081018; --canvas-subtle: #101828; --canvas-inset: #040810; --border-default: #2060a0; --border-muted: #104070; --accent-fg: #40c0ff; --accent-emphasis: #2090d0; --success-fg: #ff8040; --success-emphasis: #d06030; --btn-gradient: linear-gradient(145deg, #2090d0, #1878b8); --btn-shadow: #104060; --glow-color: rgba(32, 144, 208, 0.15); }
        body.theme-street-fighter { --canvas-default: #181010; --canvas-subtle: #281818; --canvas-inset: #0c0808; --border-default: #804020; --border-muted: #503018; --accent-fg: #ff8040; --accent-emphasis: #d06030; --success-fg: #40a0ff; --success-emphasis: #3080d0; --btn-gradient: linear-gradient(145deg, #d06030, #b05028); --btn-shadow: #602818; --glow-color: rgba(208, 96, 48, 0.15); }
        body.theme-f-zero { --canvas-default: #101018; --canvas-subtle: #181828; --canvas-inset: #08080c; --border-default: #4040a0; --border-muted: #303070; --accent-fg: #8080ff; --accent-emphasis: #6060d0; --success-fg: #ff4040; --success-emphasis: #d03030; --btn-gradient: linear-gradient(145deg, #6060d0, #5050b0); --btn-shadow: #303070; --glow-color: rgba(96, 96, 208, 0.15); }
        body.theme-star-fox { --canvas-default: #0c1018; --canvas-subtle: #141c28; --canvas-inset: #06080c; --border-default: #305080; --border-muted: #203858; --accent-fg: #60a0e0; --accent-emphasis: #4080c0; --success-fg: #60e060; --success-emphasis: #40b040; --btn-gradient: linear-gradient(145deg, #4080c0, #3068a0); --btn-shadow: #204060; --glow-color: rgba(64, 128, 192, 0.15); }
        body.theme-secret-of-mana { --canvas-default: #101810; --canvas-subtle: #182818; --canvas-inset: #080c08; --border-default: #408040; --border-muted: #285828; --accent-fg: #80ff80; --accent-emphasis: #60d060; --success-fg: #ffcc60; --success-emphasis: #d0a040; --btn-gradient: linear-gradient(145deg, #60d060, #50b050); --btn-shadow: #306030; --glow-color: rgba(96, 208, 96, 0.15); }
        body.theme-castlevania-iv { --canvas-default: #100810; --canvas-subtle: #180c18; --canvas-inset: #080408; --border-default: #602060; --border-muted: #401040; --accent-fg: #c060c0; --accent-emphasis: #a040a0; --success-fg: #ff6060; --success-emphasis: #d04040; --btn-gradient: linear-gradient(145deg, #a040a0, #803080); --btn-shadow: #401840; --glow-color: rgba(160, 64, 160, 0.15); }
        body.theme-contra-iii { --canvas-default: #101010; --canvas-subtle: #1c1c1c; --canvas-inset: #080808; --border-default: #505050; --border-muted: #383838; --accent-fg: #ff4040; --accent-emphasis: #d03030; --success-fg: #ffcc00; --success-emphasis: #cca000; --btn-gradient: linear-gradient(145deg, #d03030, #b02828); --btn-shadow: #601818; --glow-color: rgba(208, 48, 48, 0.15); }
        body.theme-kirby-superstar { --canvas-default: #180a18; --canvas-subtle: #281428; --canvas-inset: #0c050c; --border-default: #c04080; --border-muted: #802850; --accent-fg: #ff90c0; --accent-emphasis: #e070a0; --success-fg: #ffff80; --success-emphasis: #d0d060; --btn-gradient: linear-gradient(145deg, #e070a0, #c06090); --btn-shadow: #803050; --glow-color: rgba(224, 112, 160, 0.15); }
        body.theme-yoshis-island { --canvas-default: #101810; --canvas-subtle: #1c2c1c; --canvas-inset: #080c08; --border-default: #50a050; --border-muted: #387038; --accent-fg: #90ff90; --accent-emphasis: #70d070; --success-fg: #ff9090; --success-emphasis: #d07070; --btn-gradient: linear-gradient(145deg, #70d070, #60b060); --btn-shadow: #386038; --glow-color: rgba(112, 208, 112, 0.15); }
        body.theme-super-punch-out { --canvas-default: #101820; --canvas-subtle: #182838; --canvas-inset: #080c10; --border-default: #3080a0; --border-muted: #205870; --accent-fg: #60d0ff; --accent-emphasis: #40a0d0; --success-fg: #ffc040; --success-emphasis: #d0a030; --btn-gradient: linear-gradient(145deg, #40a0d0, #3088b8); --btn-shadow: #205060; --glow-color: rgba(64, 160, 208, 0.15); }
        body.theme-actraiser { --canvas-default: #101018; --canvas-subtle: #181c28; --canvas-inset: #08080c; --border-default: #4050a0; --border-muted: #303870; --accent-fg: #a0b0ff; --accent-emphasis: #7088d0; --success-fg: #ffd080; --success-emphasis: #d0a860; --btn-gradient: linear-gradient(145deg, #7088d0, #6078b8); --btn-shadow: #384068; --glow-color: rgba(112, 136, 208, 0.15); }
        body.theme-terranigma { --canvas-default: #080c10; --canvas-subtle: #101820; --canvas-inset: #040608; --border-default: #206080; --border-muted: #104058; --accent-fg: #40b0e0; --accent-emphasis: #3090c0; --success-fg: #e0a040; --success-emphasis: #b88030; --btn-gradient: linear-gradient(145deg, #3090c0, #2878a0); --btn-shadow: #104858; --glow-color: rgba(48, 144, 192, 0.15); }
        body.theme-classic-snes { --canvas-default: #1a1a2e; --canvas-subtle: #25253d; --canvas-inset: #0f0f1a; --border-default: #4a4a6a; --border-muted: #35354d; --accent-fg: #b4b4dc; --accent-emphasis: #8080b0; --success-fg: #50c878; --success-emphasis: #3da35d; --btn-gradient: linear-gradient(145deg, #8080b0, #6060a0); --btn-shadow: #404070; --glow-color: rgba(128, 128, 176, 0.15); }
        
        body {
            background: var(--canvas-default);
            background-image: radial-gradient(ellipse at top, var(--glow-color) 0%, transparent 50%);
            min-height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Mona Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 10px;
            padding-top: max(10px, env(safe-area-inset-top));
            padding-bottom: max(10px, env(safe-area-inset-bottom));
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
            overflow-x: hidden;
            transition: background 0.3s, background-image 0.3s;
        }
        
        .container { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; max-width: 500px; }
        .header { display: flex; align-items: center; gap: 10px; padding: 8px 16px; background: var(--canvas-subtle); border: 1px solid var(--border-default); border-radius: 6px; width: 100%; max-width: 380px; transition: background 0.3s, border-color 0.3s; }
        .header-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .header-title { display: flex; flex-direction: column; }
        .header-main { color: var(--fg-default); font-size: 16px; font-weight: 700; }
        .header-sub { color: var(--fg-muted); font-size: 11px; font-family: 'JetBrains Mono', monospace; }
        .header-badge { margin-left: auto; background: var(--success-emphasis); color: var(--fg-default); font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 12px; cursor: pointer; transition: background 0.3s; }
        
        .now-playing { display: none; align-items: center; gap: 8px; padding: 6px 12px; background: var(--canvas-subtle); border: 1px solid var(--border-default); border-radius: 6px; max-width: 380px; width: 100%; }
        .now-playing.show { display: flex; }
        .now-playing-icon { width: 24px; height: 24px; background: var(--success-emphasis); border-radius: 4px; display: flex; align-items: center; justify-content: center; }
        .now-playing-icon svg { width: 12px; height: 12px; fill: var(--fg-default); }
        .now-playing-text { flex: 1; min-width: 0; }
        .now-playing-label { color: var(--fg-muted); font-size: 9px; font-family: 'JetBrains Mono', monospace; }
        .now-playing-name { color: var(--fg-default); font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .snes-console { position: relative; }
        .console-top { width: min(380px, 95vw); background: linear-gradient(180deg, #d0d0d8 0%, #b8b8c0 50%, #a0a0a8 100%); border-radius: 12px 12px 0 0; padding: 15px; box-shadow: inset 0 2px 0 rgba(255,255,255,0.5), 0 -2px 10px rgba(0,0,0,0.2); display: flex; flex-direction: column; align-items: center; gap: 8px; border: 2px solid #888; border-bottom: none; }
        .console-label { color: #505060; font-size: 10px; font-family: 'JetBrains Mono', monospace; font-weight: bold; letter-spacing: 3px; }
        .screen-area { width: 100%; background: var(--canvas-inset); border-radius: 8px; padding: 10px; box-shadow: inset 0 4px 15px rgba(0,0,0,0.8); }
        .options-row { display: flex; justify-content: space-between; width: 100%; padding: 0 10px; }
        .options-btn { background: #606070; border: 1px solid #404050; border-radius: 4px; color: #c0c0c8; font-size: 9px; font-family: 'JetBrains Mono', monospace; padding: 3px 10px; cursor: pointer; }
        #game { width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 4px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #game * { touch-action: none; }
        .game-placeholder { text-align: center; color: var(--fg-subtle); padding: 20px; }
        .game-placeholder svg { width: 48px; height: 48px; fill: var(--fg-subtle); margin-bottom: 10px; opacity: 0.5; }
        .game-placeholder p { font-size: 11px; font-family: 'JetBrains Mono', monospace; }
        
        .console-bottom { width: min(380px, 95vw); background: linear-gradient(180deg, #a0a0a8 0%, #909098 50%, #808088 100%); border-radius: 0 0 20px 20px; padding: 12px 15px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); display: flex; flex-direction: column; gap: 12px; border: 2px solid #888; border-top: none; }
        
        .controls-row { display: flex; justify-content: space-between; align-items: center; padding: 0 5px; }
        
        .dpad-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .dpad { width: 90px; height: 90px; position: relative; }
        .dpad-btn { position: absolute; background: linear-gradient(145deg, #303038, #202028); border: 2px solid #404048; display: flex; align-items: center; justify-content: center; color: #606068; font-size: 14px; }
        .dpad-btn:active, .dpad-btn.pressed { background: linear-gradient(145deg, #202028, #101018); color: var(--accent-fg); }
        .dpad-up, .dpad-down { width: 30px; height: 32px; left: 30px; }
        .dpad-up { top: 0; border-radius: 6px 6px 0 0; }
        .dpad-down { bottom: 0; border-radius: 0 0 6px 6px; }
        .dpad-left, .dpad-right { width: 32px; height: 30px; top: 30px; }
        .dpad-left { left: 0; border-radius: 6px 0 0 6px; }
        .dpad-right { right: 0; border-radius: 0 6px 6px 0; }
        .dpad-center { position: absolute; width: 30px; height: 30px; top: 30px; left: 30px; background: #252530; border: 2px solid #404048; }
        
        .action-btns-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .action-btns { display: flex; flex-direction: column; align-items: center; gap: 0; }
        .action-row-middle { display: flex; gap: 38px; }
        .action-btn { width: 38px; height: 38px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.3); font-weight: bold; font-size: 12px; font-family: 'JetBrains Mono', monospace; box-shadow: 0 3px 0 rgba(0,0,0,0.3), inset 0 -2px 5px rgba(0,0,0,0.2); }
        .action-btn:active, .action-btn.pressed { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.3); }
        .btn-x { background: linear-gradient(145deg, #6080d0, #4060b0); color: #fff; margin-bottom: -8px; }
        .btn-a { background: linear-gradient(145deg, #d06060, #b04040); color: #fff; }
        .btn-y { background: linear-gradient(145deg, #50a050, #408040); color: #fff; }
        .btn-b { background: linear-gradient(145deg, #d0c040, #b0a030); color: #fff; margin-top: -8px; }
        
        .shoulder-btns { display: flex; justify-content: space-between; padding: 0 10px; }
        .shoulder-btn { width: 70px; height: 22px; background: linear-gradient(180deg, #484850, #383840); border: 2px solid #505058; border-radius: 6px; color: #909098; font-size: 11px; font-weight: bold; font-family: 'JetBrains Mono', monospace; }
        .shoulder-btn:active, .shoulder-btn.pressed { background: linear-gradient(180deg, #383840, #282830); }
        
        .menu-btns { display: flex; justify-content: center; gap: 20px; }
        .menu-btn { width: 50px; height: 14px; background: linear-gradient(180deg, #484850, #383840); border: 1px solid #505058; border-radius: 8px; color: #808088; font-size: 8px; font-family: 'JetBrains Mono', monospace; }
        .menu-btn:active, .menu-btn.pressed { background: linear-gradient(180deg, #383840, #282830); }
        
        .brand { text-align: center; color: #606068; font-size: 10px; font-family: 'JetBrains Mono', monospace; font-weight: bold; letter-spacing: 2px; }
        
        .status { color: var(--fg-muted); font-size: 11px; text-align: center; font-family: 'JetBrains Mono', monospace; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--fg-subtle); }
        .status-dot.success { background: var(--success-fg); animation: pulse 2s ease-in-out infinite; }
        .status-dot.warning { background: var(--attention-fg); animation: pulse 1s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(4px); z-index: 1000; justify-content: center; align-items: center; padding: 10px; }
        .modal.show { display: flex; }
        .modal-content { background: var(--canvas-subtle); border: 1px solid var(--border-default); border-radius: 12px; padding: 16px; width: min(360px, 95vw); max-height: 85vh; overflow-y: auto; }
        .modal-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border-default); }
        .modal-header svg { width: 24px; height: 24px; fill: var(--fg-default); }
        .modal-title { color: var(--fg-default); font-size: 16px; font-weight: 700; }
        .modal-section { color: var(--fg-muted); font-size: 11px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 1px; margin: 14px 0 8px; display: flex; align-items: center; gap: 8px; }
        .modal-section::after { content: ''; flex: 1; height: 1px; background: var(--border-muted); }
        .modal-option { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: var(--canvas-default); border: 1px solid var(--border-muted); border-radius: 6px; margin-bottom: 8px; }
        .modal-option label { color: var(--fg-default); font-size: 13px; font-weight: 500; }
        .modal-option button, .modal-option select { background: var(--success-emphasis); border: none; border-radius: 6px; padding: 6px 12px; font-size: 12px; font-weight: 600; color: var(--fg-default); cursor: pointer; }
        .modal-option select { background: var(--canvas-subtle); border: 1px solid var(--border-default); max-width: 140px; }
        .modal-close { display: block; width: 100%; margin-top: 12px; padding: 10px; background: var(--canvas-default); border: 1px solid var(--border-default); border-radius: 6px; color: var(--fg-default); font-size: 14px; font-weight: 600; cursor: pointer; }
        
        .search-box { position: relative; margin-bottom: 10px; }
        .search-input { width: 100%; padding: 10px 12px 10px 36px; background: var(--canvas-default); border: 1px solid var(--border-default); border-radius: 6px; color: var(--fg-default); font-size: 13px; }
        .search-input:focus { outline: none; border-color: var(--accent-fg); }
        .search-input::placeholder { color: var(--fg-subtle); }
        .search-box svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; fill: var(--fg-subtle); }
        .rom-count { color: var(--fg-muted); font-size: 11px; font-family: 'JetBrains Mono', monospace; margin-bottom: 8px; }
        .rom-library { max-height: 300px; overflow-y: auto; margin-bottom: 10px; }
        .rom-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: var(--canvas-default); border: 1px solid var(--border-muted); border-radius: 6px; margin-bottom: 6px; cursor: pointer; transition: all 0.15s; }
        .rom-item:hover { border-color: var(--accent-fg); background: var(--border-muted); }
        .rom-item:active { transform: scale(0.98); }
        .rom-icon { width: 36px; height: 36px; background: var(--canvas-subtle); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .rom-icon svg { width: 18px; height: 18px; fill: var(--accent-fg); }
        .rom-info { flex: 1; min-width: 0; }
        .rom-name { color: var(--fg-default); font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .rom-meta { color: var(--fg-muted); font-size: 10px; font-family: 'JetBrains Mono', monospace; }
        .rom-play { background: var(--success-emphasis); border: none; border-radius: 6px; padding: 6px 10px; color: var(--fg-default); font-size: 10px; font-weight: 600; cursor: pointer; }
        .library-empty, .library-loading { text-align: center; padding: 30px 20px; color: var(--fg-muted); }
        .spinner { width: 32px; height: 32px; border: 3px solid var(--border-default); border-top-color: var(--accent-fg); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .file-label { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 12px; background: var(--canvas-default); border: 1px dashed var(--border-default); border-radius: 6px; color: var(--fg-muted); font-size: 13px; cursor: pointer; margin-top: 10px; }
        .file-label:hover { border-color: var(--accent-fg); color: var(--fg-default); }
        .hidden { display: none; }
        
        .ejs_virtualGamepad_container, [class*="virtualGamepad"], .ejs_menu_bar, .ejs_control_bar { display: none !important; visibility: hidden !important; pointer-events: none !important; }
        #game canvas { width: 100% !important; height: 100% !important; image-rendering: pixelated; }
    </style>
</head>
<body>

    <script>
        // ============ CONFIG - UPDATE THESE FOR YOUR SNES FOLDER ============
        const FOLDER_ID = '1I-OxQYkysje5FP_OOtfhogXKMo1DaZbd';
        const API_KEY = 'AIzaSyAL1l3O7Jr8M635xZsxT3jI9yE-yp13KTc';
        
        let romLibrary = [];
        let filteredRoms = [];
        let emu = null;
        let isMuted = false;
        let currentRomName = '';
        let currentRomBlob = null;
        let currentRomId = null;
        
        const CORS_PROXIES = ['https://api.allorigins.win/raw?url=', 'https://corsproxy.io/?'];
        
        // ============ THEME ============
        const savedTheme = localStorage.getItem('snes-theme') || '';
        if (savedTheme) document.body.classList.add(savedTheme);
        
        document.getElementById('theme-select').value = savedTheme;
        document.getElementById('theme-select').addEventListener('change', (e) => {
            document.body.className = document.body.className.replace(/theme-\S+/g, '').trim();
            if (e.target.value) document.body.classList.add(e.target.value);
            localStorage.setItem('snes-theme', e.target.value);
        });
        
        // ============ GOOGLE DRIVE API ============
        async function fetchDriveFolder() {
            const files = [];
            let pageToken = '';
            
            do {
                let url = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents&key=${API_KEY}&pageSize=1000&fields=nextPageToken,files(id,name,size)`;
                if (pageToken) url += `&pageToken=${pageToken}`;
                
                const response = await fetch(url);
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || 'API request failed');
                }
                
                const data = await response.json();
                const snesFiles = (data.files || []).filter(f => 
                    f.name.toLowerCase().endsWith('.sfc') || 
                    f.name.toLowerCase().endsWith('.smc')
                );
                
                files.push(...snesFiles.map(f => ({
                    id: f.id,
                    name: f.name.replace(/\.(sfc|smc)$/i, ''),
                    size: formatSize(parseInt(f.size) || 0)
                })));
                
                pageToken = data.nextPageToken;
            } while (pageToken);
            
            files.sort((a, b) => a.name.localeCompare(b.name, undefined, { sensitivity: 'base' }));
            return files;
        }
        
        function formatSize(bytes) {
            if (!bytes) return 'SNES';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }
        
        // ============ LIBRARY UI ============
        async function loadLibrary() {
            const library = document.getElementById('rom-library');
            const countEl = document.getElementById('rom-count');
            
            library.innerHTML = '<div class="library-loading"><div class="spinner"></div><p>Loading ROMs...</p></div>';
            countEl.textContent = 'Loading...';
            
            try {
                romLibrary = await fetchDriveFolder();
                filteredRoms = romLibrary;
                
                if (romLibrary.length === 0) {
                    library.innerHTML = '<div class="library-empty"><p>No SNES ROMs found (.sfc/.smc)</p></div>';
                    countEl.textContent = '0 ROMs';
                    return;
                }
                
                countEl.textContent = `${romLibrary.length} ROMs`;
                renderRomList();
            } catch (error) {
                console.error('Load error:', error);
                library.innerHTML = `<div class="library-empty"><p>Error: ${error.message}</p></div>`;
                countEl.textContent = 'Error';
            }
        }
        
        function renderRomList() {
            const library = document.getElementById('rom-library');
            
            if (filteredRoms.length === 0) {
                library.innerHTML = '<div class="library-empty"><p>No ROMs match your search</p></div>';
                return;
            }
            
            library.innerHTML = filteredRoms.map((rom, i) => `
                <div class="rom-item" data-index="${i}">
                    <div class="rom-icon"><svg viewBox="0 0 16 16"><path d="M14.5 3H12V1.5a.5.5 0 0 0-.5-.5h-9a.5.5 0 0 0-.5.5V3H1.5A1.5 1.5 0 0 0 0 4.5v9A1.5 1.5 0 0 0 1.5 15h13a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 14.5 3Z"/></svg></div>
                    <div class="rom-info">
                        <div class="rom-name">${rom.name}</div>
                        <div class="rom-meta">${rom.size}</div>
                    </div>
                    <button class="rom-play">▶ Play</button>
                </div>
            `).join('');
            
            library.querySelectorAll('.rom-item').forEach(el => {
                el.addEventListener('click', () => {
                    const rom = filteredRoms[parseInt(el.dataset.index)];
                    loadRom(rom.id, rom.name);
                });
            });
        }
        
        document.getElementById('search-input').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            filteredRoms = romLibrary.filter(r => r.name.toLowerCase().includes(query));
            document.getElementById('rom-count').textContent = `${filteredRoms.length} of ${romLibrary.length} ROMs`;
            renderRomList();
        });
        
        // ============ ROM LOADING ============
        async function loadRom(fileId, name) {
            const statusText = document.getElementById('status-text');
            const statusDot = document.getElementById('status-dot');
            
            statusDot.className = 'status-dot warning';
            statusText.textContent = `Loading ${name}...`;
            document.getElementById('library-modal').classList.remove('show');
            
            try {
                let blob = null;
                
                try {
                    const response = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${API_KEY}`);
                    if (response.ok) blob = await response.blob();
                } catch (e) { console.log('Direct failed:', e); }
                
                if (!blob || blob.size < 1000) {
                    const proxyUrl = `https://drive.google.com/uc?export=download&id=${fileId}`;
                    for (const proxy of CORS_PROXIES) {
                        try {
                            const response = await fetch(proxy + encodeURIComponent(proxyUrl));
                            if (response.ok) {
                                const data = await response.blob();
                                if (data.size > 1000 && !data.type.includes('text/html')) {
                                    blob = data;
                                    break;
                                }
                                const text = await data.text();
                                if (text.includes('confirm=')) {
                                    const match = text.match(/confirm=([^&"']+)/);
                                    if (match) {
                                        const confirmUrl = `https://drive.google.com/uc?export=download&confirm=${match[1]}&id=${fileId}`;
                                        const confirmResp = await fetch(proxy + encodeURIComponent(confirmUrl));
                                        if (confirmResp.ok) {
                                            blob = await confirmResp.blob();
                                            if (blob.size > 1000) break;
                                        }
                                    }
                                }
                            }
                        } catch (e) { console.log('Proxy failed:', e); }
                    }
                }
                
                if (!blob || blob.size < 1000) throw new Error('Download failed');
                
                currentRomName = name;
                currentRomBlob = blob;
                currentRomId = fileId;
                document.getElementById('now-playing-name').textContent = name;
                document.getElementById('now-playing').classList.add('show');
                initEmulator(URL.createObjectURL(blob), name);
            } catch (error) {
                console.error('Load error:', error);
                statusDot.className = 'status-dot';
                statusText.textContent = 'Failed to load ROM';
                alert('Failed to load ROM: ' + error.message);
            }
        }
        
        function initEmulator(romUrl, gameName) {
            const gameDiv = document.getElementById('game');
            gameDiv.innerHTML = '';
            
            window.EJS_player = '#game';
            window.EJS_core = 'snes';
            window.EJS_gameName = gameName;
            window.EJS_color = '#1a1a2e';
            window.EJS_startOnLoaded = true;
            window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
            window.EJS_gameUrl = romUrl;
            window.EJS_VirtualGamepadSettings = false;
            window.EJS_defaultOptions = { 'virtual-gamepad': false };
            window.EJS_Buttons = { playPause:false, restart:false, mute:false, settings:false, fullscreen:false, saveState:false, loadState:false, screenRecord:false, gamepad:false, cheat:false, volume:false, quickSave:false, quickLoad:false, screenshot:false, cacheManager:false };
            
            const old = document.querySelector('script[src*="emulatorjs"]');
            if (old) old.remove();
            window.EJS_emulator = null;
            emu = null;
            
            const script = document.createElement('script');
            script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
            document.body.appendChild(script);
            document.getElementById('status-text').textContent = 'Loading emulator...';
        }
        
        let controlsSetup = false;
        
        function setupControls() {
            const newEmu = window.EJS_emulator;
            if (!newEmu?.gameManager) return false;
            
            emu = newEmu;
            
            if (!controlsSetup) {
                // SNES button mapping
                const buttons = { 
                    'btn-b': 0,      // B
                    'btn-y': 1,      // Y
                    'btn-select': 2, // Select
                    'btn-start': 3,  // Start
                    'btn-up': 4,     // Up
                    'btn-down': 5,   // Down
                    'btn-left': 6,   // Left
                    'btn-right': 7,  // Right
                    'btn-a': 8,      // A
                    'btn-x': 9,      // X
                    'btn-l': 10,     // L
                    'btn-r': 11      // R
                };
                
                Object.entries(buttons).forEach(([id, code]) => {
                    const btn = document.getElementById(id);
                    if (!btn) return;
                    const press = () => { if (emu?.gameManager) { btn.classList.add('pressed'); emu.gameManager.simulateInput(0, code, 1); } };
                    const release = () => { if (emu?.gameManager) { btn.classList.remove('pressed'); emu.gameManager.simulateInput(0, code, 0); } };
                    btn.addEventListener('touchstart', e => { e.preventDefault(); press(); }, { passive: false });
                    btn.addEventListener('touchend', e => { e.preventDefault(); release(); }, { passive: false });
                    btn.addEventListener('touchcancel', e => { e.preventDefault(); release(); }, { passive: false });
                    btn.addEventListener('mousedown', e => { e.preventDefault(); press(); });
                    btn.addEventListener('mouseup', e => { e.preventDefault(); release(); });
                    btn.addEventListener('mouseleave', release);
                });
                
                // Keyboard mapping for SNES
                const keyMap = { 
                    ArrowUp: 4, ArrowDown: 5, ArrowLeft: 6, ArrowRight: 7,
                    z: 0, Z: 0,      // B
                    x: 8, X: 8,      // A
                    a: 1, A: 1,      // Y
                    s: 9, S: 9,      // X
                    q: 10, Q: 10,    // L
                    w: 11, W: 11,    // R
                    Enter: 3,        // Start
                    Shift: 2         // Select
                };
                document.addEventListener('keydown', e => { if (emu?.gameManager && keyMap[e.key] !== undefined) { e.preventDefault(); emu.gameManager.simulateInput(0, keyMap[e.key], 1); } });
                document.addEventListener('keyup', e => { if (emu?.gameManager && keyMap[e.key] !== undefined) { e.preventDefault(); emu.gameManager.simulateInput(0, keyMap[e.key], 0); } });
                
                controlsSetup = true;
            }
            
            return true;
        }
        
        // ============ UI HANDLERS ============
        const libraryModal = document.getElementById('library-modal');
        const settingsModal = document.getElementById('settings-modal');
        
        document.getElementById('library-btn').addEventListener('click', () => {
            libraryModal.classList.add('show');
            if (romLibrary.length === 0) loadLibrary();
        });
        document.getElementById('library-close').addEventListener('click', () => libraryModal.classList.remove('show'));
        libraryModal.addEventListener('click', e => { if (e.target === libraryModal) libraryModal.classList.remove('show'); });
        
        document.getElementById('options-btn').addEventListener('click', () => settingsModal.classList.add('show'));
        document.getElementById('settings-close').addEventListener('click', () => settingsModal.classList.remove('show'));
        settingsModal.addEventListener('click', e => { if (e.target === settingsModal) settingsModal.classList.remove('show'); });
        
        document.getElementById('local-file').addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;
            currentRomName = file.name.replace(/\.(sfc|smc)$/i, '');
            currentRomBlob = file;
            currentRomId = null;
            document.getElementById('now-playing-name').textContent = currentRomName;
            document.getElementById('now-playing').classList.add('show');
            initEmulator(URL.createObjectURL(file), currentRomName);
            libraryModal.classList.remove('show');
            e.target.value = '';
        });
        
        document.getElementById('speed-select').addEventListener('change', e => { if (emu?.gameManager?.setFastForward) try { emu.gameManager.setFastForward(parseFloat(e.target.value) > 1, parseFloat(e.target.value)); } catch {} });
        document.getElementById('mute-btn').addEventListener('click', e => { if (emu?.gameManager?.setVolume) { isMuted = !isMuted; try { emu.gameManager.setVolume(isMuted ? 0 : 1); } catch {} e.target.textContent = isMuted ? '🔇 OFF' : '🔊 ON'; } });
        document.getElementById('screenshot-btn').addEventListener('click', () => { const canvas = document.querySelector('#game canvas'); if (!canvas) return alert('No game running'); const link = document.createElement('a'); link.download = `${currentRomName || 'screenshot'}.png`; link.href = canvas.toDataURL(); link.click(); });
        document.getElementById('save-btn').addEventListener('click', async () => { if (!emu?.gameManager?.getState) return alert('No game running'); try { const state = await emu.gameManager.getState(); const link = document.createElement('a'); link.download = `${currentRomName || 'save'}.state`; link.href = URL.createObjectURL(new Blob([state])); link.click(); } catch { alert('Save failed'); } });
        
        const loadStateInput = document.createElement('input');
        loadStateInput.type = 'file'; loadStateInput.accept = '.state,.sav'; loadStateInput.className = 'hidden';
        document.body.appendChild(loadStateInput);
        loadStateInput.addEventListener('change', async e => { const file = e.target.files[0]; if (!file || !emu?.gameManager?.loadState) return; try { await emu.gameManager.loadState(new Uint8Array(await file.arrayBuffer())); settingsModal.classList.remove('show'); } catch { alert('Load failed'); } e.target.value = ''; });
        document.getElementById('load-btn').addEventListener('click', () => loadStateInput.click());
        document.getElementById('restart-btn').addEventListener('click', () => { if (emu?.gameManager?.restart && confirm('Restart game?')) { emu.gameManager.restart(); settingsModal.classList.remove('show'); } });
        
        document.getElementById('download-rom-btn').addEventListener('click', () => {
            if (!currentRomName || !currentRomBlob) {
                alert('No game loaded. Load a game first, then you can download it.');
                return;
            }
            
            const link = document.createElement('a');
            link.download = `${currentRomName}.sfc`;
            link.href = URL.createObjectURL(currentRomBlob);
            link.click();
            URL.revokeObjectURL(link.href);
        });
        
        setInterval(() => { 
            const newEmu = window.EJS_emulator;
            if (newEmu?.gameManager && newEmu !== emu) {
                setupControls();
                document.getElementById('status-text').textContent = 'Ready to play!'; 
                document.getElementById('status-dot').className = 'status-dot success'; 
                document.querySelectorAll('[class*="virtualGamepad"]').forEach(el => el.remove()); 
            }
        }, 100);
        
        ['touchstart', 'click'].forEach(evt => document.addEventListener(evt, () => new (window.AudioContext || window.webkitAudioContext)().resume(), { once: true }));
        document.addEventListener('gesturestart', e => e.preventDefault());
    </script>
</body>
</html>
